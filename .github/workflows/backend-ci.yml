name: Backend CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

jobs:
  backend-tests:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run auth-service tests
        working-directory: backend/auth-service
        run: mvn test

      - name: Run product-service tests
        working-directory: backend/product-service
        run: mvn test

      - name: Run cart-service tests
        working-directory: backend/cart-service
        run: mvn test

      - name: Run order-service tests
        working-directory: backend/order-service
        run: mvn test

      - name: Run payment-service tests
        working-directory: backend/payment-service
        run: mvn test

      - name: Run notification-service tests
        working-directory: backend/notification-service
        run: mvn test

      - name: Run discovery-server tests
        working-directory: backend/discovery-server
        run: mvn test

      - name: Run api-gateway tests
        working-directory: backend/api-gateway
        run: mvn test

  backend-build:
    name: Build Backend Services
    runs-on: ubuntu-latest
    needs: backend-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build auth-service
        working-directory: backend/auth-service
        run: mvn package -DskipTests

      - name: Build product-service
        working-directory: backend/product-service
        run: mvn package -DskipTests

      - name: Build cart-service
        working-directory: backend/cart-service
        run: mvn package -DskipTests

      - name: Build order-service
        working-directory: backend/order-service
        run: mvn package -DskipTests

      - name: Build payment-service
        working-directory: backend/payment-service
        run: mvn package -DskipTests

      - name: Build notification-service
        working-directory: backend/notification-service
        run: mvn package -DskipTests

      - name: Build discovery-server
        working-directory: backend/discovery-server
        run: mvn package -DskipTests

      - name: Build api-gateway
        working-directory: backend/api-gateway
        run: mvn package -DskipTests