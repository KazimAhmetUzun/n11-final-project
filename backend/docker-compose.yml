version: "3.8"

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - ecommerce-network

  auth-db:
    image: postgres:16
    container_name: auth-db
    restart: always
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network

  auth-service:
    image: ecommerce/auth-service:latest
    container_name: auth-service
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      - auth-db
      - rabbitmq
      - discovery-server
    networks:
      - ecommerce-network

  product-db:
    image: postgres:16
    container_name: product-db
    restart: always
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - product_db_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network

  cart-db:
    image: postgres:16
    container_name: cart-db
    restart: always
    environment:
      POSTGRES_DB: cart_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - cart_db_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
  cart-service:
    image: ecommerce/cart-service:latest
    container_name: cart-service
    restart: always
    ports:
      - "8083:8083"
    depends_on:
      - cart-db
      - discovery-server
    networks:
      - ecommerce-network

  order-db:
    image: postgres:16
    container_name: order-db
    restart: always
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - order_db_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
  order-service:
    image: ecommerce/order-service:latest
    container_name: order-service
    restart: always
    ports:
      - "8084:8084"
    depends_on:
      - order-db
      - rabbitmq
      - discovery-server
    networks:
      - ecommerce-network

  payment-db:
    image: postgres:16
    container_name: payment-db
    restart: always
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - payment_db_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
  payment-service:
    image: ecommerce/payment-service:latest
    container_name: payment-service
    restart: always
    ports:
      - "8085:8085"
    environment:
      IYZICO_API_KEY: ${IYZICO_API_KEY}
      IYZICO_SECRET_KEY: ${IYZICO_SECRET_KEY}
    depends_on:
      - payment-db
      - rabbitmq
      - discovery-server
    networks:
      - ecommerce-network
  notification-service:
    image: ecommerce/notification-service:latest
    container_name: notification-service
    restart: always
    ports:
      - "8086:8086"
    environment:
      MAIL_HOST: ${MAIL_HOST}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    depends_on:
      - rabbitmq
      - discovery-server
    networks:
      - ecommerce-network

  discovery-server:
    image: ecommerce/discovery-server:latest
    container_name: discovery-server
    restart: always
    ports:
      - "8761:8761"
    networks:
      - ecommerce-network

  product-service:
    image: ecommerce/product-service:latest
    container_name: product-service
    restart: always
    ports:
      - "8082:8082"
    depends_on:
      - product-db
      - discovery-server
    networks:
      - ecommerce-network
  api-gateway:
    image: ecommerce/api-gateway:latest
    container_name: api-gateway
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - discovery-server
      - auth-service
      - product-service
      - cart-service
      - order-service
      - payment-service
    networks:
      - ecommerce-network

volumes:
  auth_db_data:
  product_db_data:
  cart_db_data:
  order_db_data:
  payment_db_data:

networks:
  ecommerce-network:
    driver: bridge