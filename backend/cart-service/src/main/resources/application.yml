server:
  port: 8083

spring:
  application:
    name: cart-service

  datasource:
    url: jdbc:postgresql://localhost:5435/cart_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

        springdoc:
          api-docs:
            enabled: true
            path: /v3/api-docs
          swagger-ui:
            enabled: true
            path: /swagger-ui.html

            logging:
              level:
                root: INFO
                com.n11.cartservice: DEBUG

                eureka:
                  client:
                    service-url:
                      defaultZone: http://localhost:8761/eureka/
                  instance:
                    prefer-ip-address: true